services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: iam-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://iam-lab-db.cfqiyasgg3b3.eu-west-1.rds.amazonaws.com:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password123
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/conf/server.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/conf/server.key
    command: start-dev
    ports:
      - "8443:8443"
      - "8080:8080"
    volumes:
      - "/home/ubuntu/iam-lab/certs/server.crt:/opt/keycloak/conf/server.crt"
      - "/home/ubuntu/iam-lab/certs/server.key:/opt/keycloak/conf/server.key"
    networks:
      - iam-network
    restart: unless-stopped

  portal:
    build: ./apps/portal
    container_name: iam-portal
    ports:
      - "5000:5000"
    depends_on:
      - keycloak
    networks:
      - iam-network
    restart: unless-stopped

  tickets:
    build: ./apps/tickets
    container_name: iam-tickets
    ports:
      - "5001:5001"
    depends_on:
      - keycloak
    networks:
      - iam-network
    restart: unless-stopped

  admin:
    build: ./apps/admin
    container_name: iam-admin
    ports:
      - "5002:5002"
    depends_on:
      - keycloak
    networks:
      - iam-network
    restart: unless-stopped

networks:
  iam-network:
    driver: bridge
